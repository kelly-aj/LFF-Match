<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>LFF Matching Task</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">
<script src="https://unpkg.com/jspsych@7.3.4" defer></script>

<script src="https://unpkg.com/@jspsych/plugin-preload@1.1.3" defer></script>
<script src="https://unpkg.com/@jspsych/plugin-instructions@1.1.3" defer></script>
<script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3" defer></script>
<script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.2.0" defer></script>
<script src="https://unpkg.com/@jspsych/plugin-html-slider-response@1.1.3" defer></script>

<link rel="icon" href="data:,">

<style>
/* styles unchanged */
</style>
</head>

<body>
<script>
window.addEventListener('DOMContentLoaded', () => {

const jsPsych = initJsPsych({});

/* ---------------------------------
   STORAGE
--------------------------------- */

const GroundTruthBySet = {};     // top -> correct bottom
const EncodingAccuracyBySet = {}; // top -> 0/1

/* ---------------------------------
   DERIVE GROUND TRUTH
--------------------------------- */

function deriveGroundTruth(topIds, bottomIds, selectionMap) {
  const shuffled = jsPsych.randomization.shuffle([...topIds]);
  const correctTops = shuffled.slice(0,2);
  const incorrectTops = shuffled.slice(2);

  const gt = {};

  correctTops.forEach(t => gt[t] = selectionMap[t]);

  incorrectTops.forEach(t => {
    const chosen = selectionMap[t];
    const pool = bottomIds.filter(b => b !== chosen);
    gt[t] = jsPsych.randomization.sampleWithoutReplacement(pool,1)[0];
  });

  return { groundTruth: gt };
}

/* ---------------------------------
   ENCODING
--------------------------------- */

function MatchingEncodingTrial(set) {

return [{
  type: jsPsychHtmlButtonResponse,
  stimulus: "...",
  choices: [],
  response_ends_trial: false,
  on_load: () => {

    const selectionMap = {};

    /* drag/drop handlers unchanged */

    document.getElementById('ok-encode').addEventListener('click', () => {

      const { groundTruth } = deriveGroundTruth(set.tops, set.bots, selectionMap);

      GroundTruthBySet[set.setId] = groundTruth;

      const perItem = set.tops.map(top => {
        const chosen = selectionMap[top];
        const correctBottom = groundTruth[top];
        const correct = chosen === correctBottom ? 1 : 0;
        return {
          topImage: top,
          chosenBottom: chosen,
          computerCorrectBottom: correctBottom,
          computerSaysCorrect: correct
        };
      });

      EncodingAccuracyBySet[set.setId] =
        Object.fromEntries(perItem.map(p => [p.topImage, p.computerSaysCorrect]));

      jsPsych.finishTrial({
        setId: set.setId,
        phase: 'encoding',
        participantMapping: selectionMap,
        groundTruth,
        encodingPerItem: perItem
      });
    });
  }
}];
}

/* ---------------------------------
   RETRIEVAL
--------------------------------- */

function MatchingRetrievalTrial(set) {

const groundTruth = GroundTruthBySet[set.setId];
const encodingAccuracy = EncodingAccuracyBySet[set.setId];

return [{
  type: jsPsychHtmlButtonResponse,
  stimulus: "...",
  choices: [],
  response_ends_trial: false,
  on_load: () => {

    const selectionMap = {};

    document.getElementById('ok-retr').addEventListener('click', () => {

      const perItem = set.tops.map(top => {
        const retrieved = selectionMap[top];
        const trueBottom = groundTruth[top];
        return {
          topImage: top,
          retrievedBottom: retrieved,
          encodingCorrectBottom: trueBottom,
          retrievalCorrect: retrieved === trueBottom ? 1 : 0,
          encodingWasCorrect: encodingAccuracy[top]
        };
      });

      jsPsych.finishTrial({
        setId: set.setId,
        phase: 'retrieval',
        participantMapping: selectionMap,
        retrievalPerItem: perItem
      });
    });
  }
}];
}

/* rest of your timeline unchanged */

});
</script>
</body>
</html>
