<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LFF Matching Task</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- jsPsych v7 -->
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">
  <script src="https://unpkg.com/jspsych@7.3.4"></script>

  <!-- Plugins -->
  <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-instructions@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.2.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-slider-response@1.1.3"></script>

  <link rel="icon" href="data:,">

  <style>
    /* === YOUR ORIGINAL STYLES — UNCHANGED === */
    :root {
      --cell-w: 220px;
      --cell-h: 180px;
      --img-max-w: 200px;
      --img-max-h: 160px;
      --gap: 16px;
      --ok: #2e7d32;
      --bad: #c62828;
      --row-min-width: calc(4 * var(--cell-w) + 3 * var(--gap));
    }
    body { background:#fff; margin:0; }
    .row-title { text-align:center; margin:12px 0 6px; font-weight:700; }
    .hint { text-align:center; color:#444; margin:6px 0 8px; font-size:15px; }
    .row-scroll { overflow-x:auto; margin:10px auto; }
    #top-pool { display:flex; gap:var(--gap); min-width:var(--row-min-width); }
    .grid { display:grid; grid-template-columns:repeat(4,var(--cell-w)); gap:var(--gap); }
    .top-card { border:2px solid #aaa; border-radius:10px; padding:4px; cursor:grab; }
    .drop-slot { border:2px dashed #999; border-radius:10px; }
    .drop-slot.filled { border-style:solid; }
    .img-cell { border:1px dashed #ddd; border-radius:10px; }
  </style>
</head>

<body>
<script>
window.addEventListener('DOMContentLoaded', () => {

const jsPsych = initJsPsych({});

function shuffle(a){ return jsPsych.randomization.shuffle(a); }
function imgHTML(src){ return `<img src="${src}bots:['img/Set1Bot1.png','img/Set1Bot2.png','img/Set1Bot3.png','img/Set1Bot4.png']
  },
  {
    setId:'Set2',
    tops:['img/Set2Top1.png','img/Set2Top2.png','img/Set2Top3.png','img/Set2Top4.png'],
    bots:['img/Set2Bot1.png','img/Set2Bot2.png','img/Set2Bot3.png','img/Set2Bot4.png']
  }
];

const preload_images = SETS.flatMap(s => [...s.tops, ...s.bots]);
const GroundTruthBySet = {};

/* ===========================
   GROUND TRUTH
=========================== */

function deriveGroundTruth(topIds, bottomIds, selectionMap){
  const shuffled = shuffle([...topIds]);
  const correct = shuffled.slice(0,2);
  const incorrect = shuffled.slice(2);
  const gt = {};
  correct.forEach(t => gt[t] = selectionMap[t]);
  incorrect.forEach(t => {
    const pool = bottomIds.filter(b => b !== selectionMap[t]);
    gt[t] = jsPsych.randomization.sampleWithoutReplacement(pool,1)[0];
  });
  return gt;
}

/* ===========================
   ENCODING
=========================== */

function MatchingEncodingTrial(set){

return {
  type: jsPsychHtmlButtonResponse,
  stimulus:`<p>Encoding — ${set.setId}</p><button id="ok">OK</button>`,
  choices:[],
  response_ends_trial:false,
  on_load:()=>{
    const selectionMap = {};
    set.tops.forEach((t,i)=>selectionMap[t]=set.bots[i]); // demo demo

    document.getElementById('ok').onclick=()=>{
      const groundTruth = deriveGroundTruth(set.tops,set.bots,selectionMap);
      GroundTruthBySet[set.setId] = groundTruth;

      // ===== ADDED — DATA =====
      const encodingPerItem = set.tops.map(topImage=>{
        const chosenBottom = selectionMap[topImage];
        const correctBottom = groundTruth[topImage];
        return {
          topImage,
          chosenBottom,
          correctBottom,
          encodingCorrect: chosenBottom === correctBottom ? 1 : 0
        };
      });
      // ========================

      jsPsych.finishTrial({
        setId:set.setId,
        phase:'encoding',
        participantMapping:selectionMap,
        derivedGroundTruth:groundTruth,
        encodingPerItem
      });
    };
  }
};
}

/* ===========================
   RETRIEVAL
=========================== */

function MatchingRetrievalTrial(set){

return {
  type: jsPsychHtmlButtonResponse,
  stimulus:`<p>Retrieval — ${set.setId}</p><button id="ok">OK</button>`,
  choices:[],
  response_ends_trial:false,
  on_load:()=>{
    const selectionMap = {};
    set.tops.forEach((t,i)=>selectionMap[t]=set.bots[i]); // demo

    document.getElementById('ok').onclick=()=>{
      const enc = jsPsych.data.get()
        .filter({setId:set.setId, phase:'encoding'})
        .last(1).values()[0];

      const gt = enc.derivedGroundTruth;

      // ===== ADDED — DATA =====
      const retrievalPerItem = set.tops.map(topImage=>{
        const retrievedBottom = selectionMap[topImage];
        const correctBottom = gt[topImage];
        const encItem = enc.encodingPerItem.find(e=>e.topImage===topImage);
        return {
          topImage,
          retrievedBottom,
          correctBottom,
          retrievalCorrect: retrievedBottom===correctBottom?1:0,
          encodingWasCorrect: encItem.encodingCorrect
        };
      });
      // ========================

      jsPsych.finishTrial({
        setId:set.setId,
        phase:'retrieval',
        participantMapping:selectionMap,
        retrievalPerItem
      });
    };
  }
};
}

/* ===========================
   TIMELINE
=========================== */

const timeline = [];
timeline.push({ type:jsPsychPreload, images:preload_images });
timeline.push(MatchingEncodingTrial(SETS[0]));
timeline.push(MatchingRetrievalTrial(SETS[0]));
jsPsych.run(timeline);

});
</script>
</body>
</html>
